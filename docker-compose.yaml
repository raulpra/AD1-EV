name: inmobiliaria
services:
  inmobiliaria-db:
    image: mariadb:11.3.2
    container_name: inmobiliaria-db
    restart: always
    environment:
      MYSQL_USER: inmobiliaria_user
      MYSQL_PASSWORD: inmobiliaria_password
      MYSQL_DATABASE: inmobiliaria
      MYSQL_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    healthcheck:
      test: [ CMD, healthcheck.sh, --connect, --innodb_initialized ]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - network-inmobiliaria
  api-inmobiliaria:
    image: api-inmobiliaria
    container_name: api-inmobiliaria
    ports:
      - "8080:8080"
    depends_on:
      inmobiliaria-db:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_JSON: '{
        "spring.application.name": "inmobiliaria",
        "sever.port": "8080",
        "spring.jpa.hibernate.ddl-auto": "update",
        "spring.jpa.properties.hibernate.globally_quoted_identifiers": "true",
        "spring.datasource.url": "jdbc:mariadb://inmobiliaria-db:3306/inmobiliaria",
        "spring.datasource.username": "inmobiliaria_user",
        "spring.datasource.password": "inmobiliaria_password",
        "spring.jpa.database-platform": "org.hibernate.dialect.MariaDBDialect"
      }'
    networks:
      - network-inmobiliaria
networks:
  network-inmobiliaria:
    driver: bridge
